<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bisheng Workflow Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app">

    <!-- ===== 顶栏 ===== -->
    <nav class="topbar">
        <div class="topbar-l">
            <div class="brand">
                <svg class="brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span class="brand-name">Bisheng <span class="brand-dim">Studio</span></span>
            </div>
        </div>
        <div class="topbar-r">
            <button type="button" id="toggleTokenBtn" class="tb-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span>Token</span>
                <span class="status-dot" id="tokenDot"></span>
            </button>
            <button type="button" id="toggleSidebarBtn" class="tb-btn tb-btn-sidebar" aria-label="切换侧边栏">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                <span>历史</span>
            </button>
            <div class="tb-divider"></div>
            <button type="button" id="newSessionBtn" class="tb-btn tb-btn-primary">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>新会话</span>
            </button>
        </div>
    </nav>

    <!-- ===== Token 面板（浮层） ===== -->
    <div id="tokenPanel" class="panel panel-overlay" style="display:none">
        <div class="panel-body">
            <div class="panel-head">
                <h4>Access Token</h4>
                <button type="button" class="panel-close" onclick="this.closest('.panel').style.display='none'">&times;</button>
            </div>
            <p class="hint">用于拉取知识库列表，正式环境由登录 Cookie 自动提供</p>
            <div class="field-row">
                <input type="password" id="bishengTokenInput" class="field" placeholder="粘贴 access_token (JWT)">
                <button type="button" id="saveTokenBtn" class="btn btn-sm">保存</button>
            </div>
            <p id="tokenHint" class="field-ok" style="display:none">已保存</p>
        </div>
    </div>

    <!-- ===== 主体：左侧边栏 + 对话区 ===== -->
    <div class="app-body">
        <!-- ===== 左侧：历史会话 ===== -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-head">
                <h4 id="historyPanelTitle">历史会话</h4>
                <div class="sidebar-actions">
                    <button type="button" id="historyBackBtn" class="link" style="display:none">← 返回</button>
                    <button type="button" id="refreshHistoryBtn" class="link">刷新</button>
                </div>
            </div>
            <div id="historyList" class="hist-list"></div>
            <div id="sessionDetail" class="session-detail" style="display:none">
                <div id="sessionTimeline" class="session-timeline"></div>
            </div>
        </aside>

        <!-- ===== 右侧：对话区 ===== -->
        <main class="conversation">
        <div id="chatMessages" class="messages">
            <div class="welcome" id="welcomeBlock">
                <div class="w-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="w-title">你想创建什么工作流？</h1>
                <p class="w-desc">描述你的需求，AI 将自动生成毕昇平台工作流。<br>支持多轮对话，模糊需求会先澄清再生成。</p>
                <div class="w-chips">
                    <button type="button" class="chip" data-q="创建一个深汕招商政策查询助手">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        招商政策查询助手
                    </button>
                    <button type="button" class="chip" data-q="做一个天气查询工作流">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                        天气查询工作流
                    </button>
                    <button type="button" class="chip" data-q="创建一个智能客服机器人">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="3"/></svg>
                        智能客服机器人
                    </button>
                </div>
            </div>
        </div>
        </main>
    </div>

    <!-- ===== 错误浮层 ===== -->
    <div id="error" class="err-float" style="display:none"></div>

    <!-- ===== JSON 查看弹窗 ===== -->
    <div id="jsonModal" class="modal-overlay" style="display:none">
        <div class="modal-card">
            <div class="modal-head">
                <span class="modal-title">workflow.json</span>
                <div class="modal-actions">
                    <button id="modalImportBtn" class="btn btn-primary btn-sm">导入到毕昇</button>
                    <button id="modalDownloadBtn" class="btn btn-sm">下载</button>
                    <button id="modalCopyBtn" class="btn btn-sm">复制</button>
                    <button class="modal-close" id="modalCloseBtn">&times;</button>
                </div>
            </div>
            <pre id="jsonContent"><code></code></pre>
        </div>
    </div>

    <!-- ===== 输入栏 ===== -->
    <footer class="composer">
        <div class="composer-box">
            <textarea id="queryInput" rows="1" placeholder="描述你想创建的工作流..."></textarea>
            <button id="generateBtn" class="composer-send" title="发送">
                <svg id="sendIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                <span id="sendSpinner" class="spinner" style="display:none"></span>
            </button>
        </div>
        <p class="composer-hint" id="inputHint">Enter 发送 · Shift+Enter 换行</p>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" crossorigin="anonymous"></script>
<script src="/static/app.js?v=4"></script>
</body>
</html>
