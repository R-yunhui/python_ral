<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE 测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #logs { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; margin-top: 20px; background: #f5f5f5; }
        .log-item { margin: 5px 0; padding: 5px; border-bottom: 1px solid #ddd; }
        .log-error { color: red; }
        .log-success { color: green; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        input { padding: 10px; width: 400px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>SSE 连接测试</h1>
    <div>
        <input type="text" id="queryInput" value="创建一个天气查询的工作流" />
        <button onclick="startSSE()">开始 SSE 连接</button>
    </div>
    <div id="logs"></div>

    <script>
        let eventSource = null;

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${type}`;
            logItem.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(logItem);
            logs.scrollTop = logs.scrollHeight;
        }

        function startSSE() {
            const query = document.getElementById('queryInput').value;
            const url = `/api/generate/stream?query=${encodeURIComponent(query)}`;
            
            log(`正在连接：${url}`);
            
            // 关闭之前的连接
            if (eventSource) {
                eventSource.close();
                log('已关闭之前的连接');
            }

            // 创建新的 EventSource
            eventSource = new EventSource(url);
            log('EventSource 创建成功');

            // 监听 open 事件
            eventSource.onopen = () => {
                log('SSE 连接已建立', 'success');
            };

            // 监听进度事件
            eventSource.addEventListener('progress', (event) => {
                log(`收到进度事件：${event.data.substring(0, 100)}...`);
                try {
                    const data = JSON.parse(event.data);
                    log(`  - 事件类型：${data.event_type}`);
                    log(`  - 消息：${data.message}`);
                    if (data.progress !== undefined) {
                        log(`  - 进度：${data.progress}%`);
                    }
                } catch (err) {
                    log(`解析进度事件失败：${err.message}`, 'error');
                }
            });

            // 监听完成事件
            eventSource.addEventListener('complete', (event) => {
                log(`收到完成事件`, 'success');
                try {
                    const data = JSON.parse(event.data);
                    log(`  - 消息：${data.message}`);
                    log(`  - 数据：${JSON.stringify(data.data, null, 2).substring(0, 200)}...`);
                    
                    eventSource.close();
                    log('连接已关闭', 'success');
                } catch (err) {
                    log(`解析完成事件失败：${err.message}`, 'error');
                }
            });

            // 监听错误事件
            eventSource.addEventListener('error', (event) => {
                log(`收到错误事件`, 'error');
                try {
                    const data = JSON.parse(event.data);
                    log(`  - 错误：${data.error || data.message}`, 'error');
                    
                    eventSource.close();
                } catch (err) {
                    log(`解析错误事件失败：${err.message}`, 'error');
                }
            });

            // 监听连接错误
            eventSource.onerror = (err) => {
                log(`SSE 连接错误：${err.message || '未知错误'}`, 'error');
                if (eventSource.readyState === EventSource.CLOSED) {
                    log('连接已关闭', 'error');
                } else if (eventSource.readyState === EventSource.CONNECTING) {
                    log('正在重连...', 'info');
                }
            };
        }
    </script>
</body>
</html>
